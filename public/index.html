<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />

<title>Andrea & Alberto — 16.04.2027</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500&family=Pinyon+Script&family=Italiana&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>
  :root{
    --paper:#faf6ee;
    --paper-2:#efe3cf;
    --ink:#3f3420;
    --ink-soft:#7b684b;
    --ink-mute:#a89070;
    --sage-deep:#7b684b;
    --sage:#b79a6f;
    --sage-light:#dcc7a2;
    --sage-wash:#eadcc6;
    --accent:#b79a6f;
    --line:rgba(63,52,32,.18);
    --shadow:0 1px 0 rgba(255,255,255,.7) inset, 0 18px 60px -28px rgba(63,52,32,.22);
    --serif:"Cormorant Garamond", "Cormorant", "Times New Roman", serif;
    --display:"Italiana", "Cormorant Garamond", serif;
    --script:"Pinyon Script", "Snell Roundhand", cursive;
    --sans:"Inter", ui-sans-serif, system-ui, sans-serif;
  }

  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--serif);
    font-weight:400;
    -webkit-font-smoothing:antialiased;
    overflow-x:hidden;
  }

  body::before{
    content:"";
    position:fixed; inset:0;
    pointer-events:none;
    z-index:0;
    background-image:
      radial-gradient(rgba(63,52,32,.04) 1px, transparent 1px),
      radial-gradient(rgba(63,52,32,.03) 1px, transparent 1px);
    background-size: 3px 3px, 7px 7px;
    background-position: 0 0, 1px 2px;
    opacity:.55;
    mix-blend-mode:multiply;
  }

  #root{ position:relative; z-index:1; }

  .micro{
    font-family:var(--sans);
    font-size:11px;
    letter-spacing:.32em;
    text-transform:uppercase;
    color:var(--ink-soft);
    font-weight:500;
  }
  .rule{
    display:inline-flex; align-items:center; gap:14px;
    color:var(--ink-mute);
  }
  .rule::before, .rule::after{
    content:""; display:block; width:48px; height:1px;
    background:currentColor;
  }
  .script{ font-family:var(--script); font-weight:400; }
  .display{ font-family:var(--display); font-weight:400; letter-spacing:.02em; }

  .blob{
    position:absolute;
    pointer-events:none;
    border-radius:50%;
    filter:blur(40px);
    opacity:.55;
    mix-blend-mode:multiply;
  }
  .blob.b1{ background:radial-gradient(circle at 30% 30%, var(--sage-light), transparent 60%); }
  .blob.b2{ background:radial-gradient(circle at 60% 40%, var(--sage), transparent 65%); }
  .blob.b3{ background:radial-gradient(circle at 50% 50%, var(--sage-wash), transparent 70%); }

  @keyframes drift1 { 0%,100%{ transform:translate(0,0) scale(1)} 50%{ transform:translate(40px,-30px) scale(1.08)} }
  @keyframes drift2 { 0%,100%{ transform:translate(0,0) scale(1)} 50%{ transform:translate(-30px,40px) scale(1.12)} }
  @keyframes drift3 { 0%,100%{ transform:translate(0,0) scale(1)} 50%{ transform:translate(20px,30px) scale(.95)} }
  .a-drift1{ animation: drift1 14s ease-in-out infinite; }
  .a-drift2{ animation: drift2 18s ease-in-out infinite; }
  .a-drift3{ animation: drift3 22s ease-in-out infinite; }

  .reveal{ opacity:0; transform:translateY(20px); transition: opacity 1.2s ease, transform 1.2s ease; }
  .reveal.in{ opacity:1; transform:none; }

  .btn{
    appearance:none; border:1px solid var(--ink); background:transparent;
    color:var(--ink); font-family:var(--sans); font-size:12px; letter-spacing:.28em;
    text-transform:uppercase; padding:14px 28px; cursor:pointer;
    transition:background .25s ease, color .25s ease;
  }
  .btn:hover{ background:var(--ink); color:var(--paper); }
  .btn.btn-sage{ border-color:var(--sage-deep); color:var(--sage-deep); }
  .btn.btn-sage:hover{ background:var(--sage-deep); color:var(--paper); }
  .btn.btn-filled{ background:var(--sage-deep); color:var(--paper); border-color:var(--sage-deep); }
  .btn.btn-filled:hover{ background:var(--ink); border-color:var(--ink); }

  .field{ display:flex; flex-direction:column; gap:6px; }
  .field label{
    font-family:var(--sans); font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-soft);
  }
  .field input, .field select, .field textarea{
    appearance:none; border:0; border-bottom:1px solid var(--line);
    background:transparent; padding:8px 2px; font-family:var(--serif); font-size:18px; color:var(--ink);
    outline:none;
  }
  .field input:focus, .field select:focus, .field textarea:focus{ border-color:var(--sage-deep); }

  .top-nav{
    position:fixed; top:0; left:0; right:0; z-index:50;
    display:flex; align-items:center; justify-content:space-between;
    padding:18px 28px;
    background:linear-gradient(to bottom, rgba(250,246,238,.85), rgba(250,246,238,0));
    backdrop-filter: blur(4px);
  }
  .top-nav .brand{ font-family:var(--display); font-size:15px; letter-spacing:.24em; text-transform:uppercase; }
  .top-nav .links{ display:flex; gap:22px; }
  .top-nav .links button{
    background:transparent; border:0; cursor:pointer;
    font-family:var(--sans); font-size:11px; letter-spacing:.24em; text-transform:uppercase; color:var(--ink-soft);
  }
  .top-nav .links button:hover{ color:var(--ink); }
  .lang-toggle{ display:inline-flex; gap:2px; align-items:center; border:1px solid var(--line); border-radius:999px; padding:3px; background:rgba(255,255,255,.5); }
  .lang-toggle button{
    appearance:none; border:0; background:transparent; cursor:pointer;
    font-family:var(--sans); font-size:10px; letter-spacing:.2em; text-transform:uppercase;
    padding:5px 10px; border-radius:999px; color:var(--ink-soft);
  }
  .lang-toggle button.on{ background:var(--ink); color:var(--paper); }

  section.s{ position:relative; padding:120px 24px; overflow:hidden; }
  section.s .inner{ max-width:980px; margin:0 auto; position:relative; z-index:2; }

  .admin-fab{
    position:fixed; left:18px; bottom:18px; z-index:40;
    height:42px; padding:0 18px; border-radius:999px;
    background:rgba(63,52,32,.92); backdrop-filter:blur(12px);
    border:1px solid rgba(255,255,255,.15); cursor:pointer;
    display:inline-flex; align-items:center; gap:8px; color:var(--paper);
    font-family:var(--sans); font-size:11px; letter-spacing:.22em; text-transform:uppercase; font-weight:500;
    box-shadow:0 8px 24px -8px rgba(0,0,0,.25); transition: transform .2s ease, background .2s ease;
  }
  .admin-fab:hover{ transform:translateY(-2px); background:var(--ink); }
  .admin-fab svg{ flex-shrink:0; }

  .site-footer{ position:relative; z-index:2; padding:48px 24px 64px; border-top:1px solid var(--line); background:rgba(239,227,207,.45); backdrop-filter:blur(4px); }
  .site-footer .inner{ max-width:980px; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:24px; flex-wrap:wrap; }
  .site-footer .brand{ font-family:var(--display); font-size:14px; letter-spacing:.28em; text-transform:uppercase; color:var(--ink); }
  .site-footer .meta{ font-family:var(--sans); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-mute); }
  .site-footer .admin-link{ appearance:none; background:transparent; border:1px solid var(--line); cursor:pointer; font-family:var(--sans); font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; padding:10px 18px; color:var(--ink-soft); border-radius:999px; display:inline-flex; align-items:center; gap:8px; transition: background .2s, color .2s, border-color .2s; }
  .site-footer .admin-link:hover{ background:var(--ink); color:var(--paper); border-color:var(--ink); }

  .modal-back{ position:fixed; inset:0; background:rgba(63,52,32,.45); backdrop-filter:blur(6px); z-index:200; display:flex; align-items:center; justify-content:center; padding:24px; }
  .modal{ background:var(--paper); border:1px solid var(--line); max-width:560px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow); padding:36px; position:relative; }
  .modal .x{ position:absolute; top:14px; right:14px; background:transparent; border:0; cursor:pointer; color:var(--ink-soft); font-size:18px; }

  .lb-back{ position:fixed; inset:0; background:rgba(63,52,32,.92); z-index:300; display:flex; align-items:center; justify-content:center; }
  .lb-img{ max-width:92vw; max-height:88vh; object-fit:contain; box-shadow:0 30px 80px rgba(0,0,0,.6); }
  .lb-nav{ position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,.1); border:1px solid rgba(255,255,255,.3); color:#fff; width:48px; height:48px; border-radius:50%; font-size:18px; cursor:pointer; }
  .lb-prev{ left:24px; } .lb-next{ right:24px; }
  .lb-close{ position:absolute; top:24px; right:24px; background:transparent; border:0; color:#fff; font-size:20px; cursor:pointer; }

  .img-ph{ background:repeating-linear-gradient(135deg, var(--sage-wash) 0 14px, var(--paper-2) 14px 28px); display:flex; align-items:center; justify-content:center; color:var(--ink-soft); font-family:ui-monospace, "SF Mono", monospace; font-size:11px; letter-spacing:.1em; text-transform:uppercase; border:1px solid var(--line); }

  .admin-panel{ position:fixed; right:0; top:0; bottom:0; width:420px; z-index:250; background:#fffdf8; border-left:1px solid var(--line); box-shadow:-20px 0 80px -40px rgba(0,0,0,.3); display:flex; flex-direction:column; transform:translateX(100%); transition:transform .35s ease; }
  .admin-panel.open{ transform:none; }
  .admin-panel .hd{ padding:18px 22px; border-bottom:1px solid var(--line); display:flex; justify-content:space-between; align-items:center; }
  .admin-panel .hd h3{ margin:0; font-family:var(--display); font-size:14px; letter-spacing:.24em; text-transform:uppercase; }
  .admin-panel .tabs{ display:flex; gap:0; padding:0 22px; border-bottom:1px solid var(--line); overflow-x:auto; }
  .admin-panel .tabs button{ appearance:none; background:transparent; border:0; cursor:pointer; padding:14px 12px; font-family:var(--sans); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:var(--ink-soft); border-bottom:2px solid transparent; white-space:nowrap; }
  .admin-panel .tabs button.on{ color:var(--ink); border-bottom-color:var(--sage-deep); }
  .admin-panel .body{ overflow-y:auto; padding:22px; flex:1; display:flex; flex-direction:column; gap:16px; }
  .admin-panel .row{ display:flex; flex-direction:column; gap:4px; }
  .admin-panel .row label{ font-family:var(--sans); font-size:10px; letter-spacing:.2em; text-transform:uppercase; color:var(--ink-soft); }
  .admin-panel .row input, .admin-panel .row textarea, .admin-panel .row select{ border:1px solid var(--line); background:#fff; font-family:var(--serif); font-size:14px; padding:8px 10px; color:var(--ink); border-radius:4px; }
  .admin-panel .row textarea{ min-height:60px; resize:vertical; }
  .admin-panel .ft{ padding:14px 22px; border-top:1px solid var(--line); display:flex; gap:10px; justify-content:flex-end; align-items:center; }
  .admin-panel .save-state{ font-family:var(--sans); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--ink-mute); margin-right:auto; }

  @media (max-width: 720px){ .top-nav .links{ display:none; } section.s{ padding:80px 18px; } .admin-panel{ width:100%; } }
  body[data-mode="editorial"] .hero-title{ text-align:left; font-size: clamp(80px, 14vw, 220px); line-height:.85; }
  body[data-mode="editorial"] section.s .inner{ max-width:1180px; }
</style>

</head>
